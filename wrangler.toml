# Cloudflare Pages Configuration
name = "family-friends-hibachi"
pages_build_output_dir = "build"

# KV Namespace binding (create via dashboard: family-friends-hibachi-bookings -> BOOKINGS)
# [[kv_namespaces]]
# binding = "BOOKINGS"
