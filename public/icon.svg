<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 主渐变 - 火焰橙色 -->
    <linearGradient id="flameGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF4500"/>
      <stop offset="50%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FFB347"/>
    </linearGradient>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <!-- 光泽效果 -->
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  
  <!-- 圆角方形背景 -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGradient)"/>
  
  <!-- 火焰图形 -->
  <g transform="translate(256, 280)">
    <!-- 外层火焰 -->
    <path d="M0,-180 
             C60,-140 80,-80 80,-20 
             C80,40 40,100 0,140 
             C-40,100 -80,40 -80,-20 
             C-80,-80 -60,-140 0,-180Z" 
          fill="url(#flameGradient)" opacity="0.9"/>
    
    <!-- 内层火焰 (更亮) -->
    <path d="M0,-120 
             C35,-90 50,-50 50,-10 
             C50,30 25,70 0,100 
             C-25,70 -50,30 -50,-10 
             C-50,-50 -35,-90 0,-120Z" 
          fill="#FFD700" opacity="0.8"/>
    
    <!-- 核心火焰 -->
    <path d="M0,-60 
             C18,-45 25,-25 25,0 
             C25,25 12,50 0,70 
             C-12,50 -25,25 -25,0 
             C-25,-25 -18,-45 0,-60Z" 
          fill="#FFFFFF" opacity="0.9"/>
  </g>
  
  <!-- H 字母 (铁板烧铲子风格) -->
  <g transform="translate(256, 256)" fill="#FFFFFF">
    <!-- 左竖线 -->
    <rect x="-90" y="-60" width="24" height="120" rx="6"/>
    <!-- 右竖线 -->
    <rect x="66" y="-60" width="24" height="120" rx="6"/>
    <!-- 横线 -->
    <rect x="-66" y="-12" width="132" height="24" rx="6"/>
  </g>
  
  <!-- 顶部光泽 -->
  <rect x="16" y="16" width="480" height="240" rx="96" ry="96" fill="url(#shineGradient)" opacity="0.1"/>
</svg>



